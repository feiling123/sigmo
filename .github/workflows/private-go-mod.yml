name: Sync Private Go Module

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - go.mod
      - go.sum

permissions:
  contents: write

concurrency:
  group: private-go-mod-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    name: Sync go.private.mod
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository && vars.SIGMO_PRIVATE_FEATURES == 'true'
    env:
      PRIVATE_GO_MODULES: |
        github.com/damonto/ts43-go
        github.com/damonto/vowifi-go
      PRIVATE_GO_TAGS: esim_transfer,wifi_calling
      PRIVATE_GO_MODFILE: go.private.mod
      PRIVATE_GOPRIVATE: github.com/damonto/*
      PRIVATE_MODULE_TOKEN: ${{ secrets.SIGMO_PRIVATE_MODULE_TOKEN }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"

      - name: Sync private module manifest
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${PRIVATE_MODULE_TOKEN}" ]; then
            echo "::notice::SIGMO_PRIVATE_MODULE_TOKEN is not configured; skip private module sync."
            exit 0
          fi

          ./scripts/sync-private-go-mod.sh

      - name: Commit synced manifest
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- go.private.mod go.private.sum; then
            echo "go.private.mod is already in sync."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add go.private.mod go.private.sum
          git commit -m "chore: sync private Go module manifest"
          git push
