name: Build and Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: [v*]
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  PRIVATE_GO_TAGS: esim_transfer
  PRIVATE_GO_MODFILE: go.private.mod
  PRIVATE_GOPRIVATE: github.com/damonto/*

jobs:
  build:
    name: Build for ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { arch: 386, name: linux-i386 }
          - { arch: amd64, name: linux-amd64 }
          - { arch: arm, name: linux-armhf }
          - { arch: arm64, name: linux-arm64 }
          - { arch: ppc64le, name: linux-ppc64le }
          - { arch: s390x, name: linux-s390x }
          - { arch: riscv64, name: linux-riscv64 }

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"

      - name: Configure private Go modules
        if: github.event_name != 'pull_request' && vars.SIGMO_PRIVATE_FEATURES == 'true'
        run: |
          go env -w GOPRIVATE="${PRIVATE_GOPRIVATE}"
          git config --global url."https://x-access-token:${{ secrets.SIGMO_PRIVATE_MODULE_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Build frontend
        run: |
          cd web
          bun install
          bun run build --mode prod

      - name: Build for ${{ matrix.target.name }}
        run: |
          go generate ./...
          BUILD_VERSION=$(git describe --always --tags --match "v*" --dirty="-dev")
          if [ "${{ github.event_name }}" != "pull_request" ] && [ "${{ vars.SIGMO_PRIVATE_FEATURES }}" = "true" ]; then
            CGO_ENABLED=0 GOARCH=${{ matrix.target.arch }} go build -tags="${PRIVATE_GO_TAGS}" -modfile="${PRIVATE_GO_MODFILE}" -trimpath -ldflags="-w -s -X main.BuildVersion=$BUILD_VERSION" -o sigmo-${{ matrix.target.name }}
          else
            CGO_ENABLED=0 GOARCH=${{ matrix.target.arch }} go build -trimpath -ldflags="-w -s -X main.BuildVersion=$BUILD_VERSION" -o sigmo-${{ matrix.target.name }}
          fi

      - name: Upload ${{ matrix.target.name }} to Artifact
        uses: actions/upload-artifact@v7
        with:
          name: sigmo-${{ matrix.target.name }}
          path: sigmo-${{ matrix.target.name }}

  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          pattern: "*"

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: "*"
