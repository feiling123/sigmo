name: Build and Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: [v*]
    paths-ignore:
      - "**/*.md"
      - "pro/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "pro/**"

permissions:
  contents: read

jobs:
  build:
    name: Build for ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { arch: 386, name: linux-i386 }
          - { arch: amd64, name: linux-amd64 }
          - { arch: arm, arm: 7, name: linux-armhf }
          - { arch: arm64, name: linux-arm64 }
          - { arch: riscv64, name: linux-riscv64 }

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"

      - name: Build frontend
        run: |
          cd web
          bun install
          bun run build --mode prod

      - name: Build for ${{ matrix.target.name }}
        env:
          TARGET_ARCH: ${{ matrix.target.arch }}
          TARGET_ARM: ${{ matrix.target.arm }}
        run: |
          set -euo pipefail

          go generate ./...
          BUILD_VERSION=$(git describe --always --tags --match "v*" --dirty="-dev")
          env_args=(GOOS=linux GOARCH="${TARGET_ARCH}" CGO_ENABLED=0)
          if [ -n "${TARGET_ARM:-}" ]; then
            env_args+=(GOARM="${TARGET_ARM}")
          fi

          env "${env_args[@]}" go build -trimpath \
            -ldflags="-w -s -X main.BuildVersion=${BUILD_VERSION}" \
            -o "sigmo-${{ matrix.target.name }}" .

      - name: Upload ${{ matrix.target.name }} to Artifact
        uses: actions/upload-artifact@v7
        with:
          name: sigmo-${{ matrix.target.name }}
          path: sigmo-${{ matrix.target.name }}

  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          pattern: "*"

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: "*"
